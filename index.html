<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBox — Hỗ trợ trực tuyến</title>
  <meta name="description" content="Chat trực tuyến với đội ngũ hỗ trợ. Phản hồi nhanh, miễn phí." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💬%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- ═══════ Welcome Screen ═══════ -->
  <div id="welcome-screen">
    <div class="welcome-card">
      <div class="welcome-icon">💬</div>
      <h1>ChatBox</h1>
      <p>Chào bạn! Nhập tên của bạn để bắt đầu trò chuyện với đội ngũ hỗ trợ của chúng tôi.</p>
      <form id="register-form">
        <div class="input-group">
          <input
            type="text"
            id="name-input"
            placeholder="Nhập tên của bạn..."
            autocomplete="off"
            autofocus
            maxlength="50"
          />
        </div>
        <button type="submit" class="btn-primary" id="start-btn">
          <span class="btn-text">Bắt đầu chat</span>
          <span class="spinner"></span>
        </button>
        <div class="error-message" id="register-error"></div>
      </form>
    </div>
  </div>

  <!-- ═══════ Chat Screen ═══════ -->
  <div id="chat-screen">
    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="header-avatar">🛡️</div>
        <div class="header-info">
          <h2>Hỗ trợ</h2>
          <div class="header-status">
            <span class="status-dot"></span>
            <span>Trực tuyến</span>
          </div>
        </div>
      </div>
      <button class="btn-icon" id="logout-btn" title="Đăng xuất">🚪</button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <p>Hãy gửi tin nhắn đầu tiên!</p>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span>Admin đang nhập...</span>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <div class="image-preview-bar" id="image-preview">
        <img id="preview-img" src="" alt="preview" />
        <div class="image-preview-info">
          <div class="filename" id="preview-filename"></div>
          <div id="preview-size"></div>
        </div>
        <button class="image-preview-remove" id="remove-preview" title="Xóa">✕</button>
      </div>
      <div class="input-row">
        <div class="input-actions">
          <button id="image-btn" title="Gửi ảnh">🖼️</button>
          <input type="file" id="image-input" accept="image/*" />
        </div>
        <div class="message-input-wrapper">
          <textarea
            id="message-input"
            placeholder="Nhập tin nhắn..."
            rows="1"
          ></textarea>
        </div>
        <button class="btn-send" id="send-btn" title="Gửi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Image Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="Full size" />
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
