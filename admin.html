<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBox — Admin Dashboard</title>
  <meta name="description" content="Admin dashboard để quản lý và trả lời tin nhắn từ khách hàng." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛡️%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/src/admin.css" />
</head>
<body>

  <!-- ═══════ Login Screen ═══════ -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-icon">🛡️</div>
      <h1>Admin Dashboard</h1>
      <p>Đăng nhập để quản lý tin nhắn từ khách hàng</p>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" placeholder="admin" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Đăng nhập</button>
        <div class="error-text" id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- ═══════ Dashboard ═══════ -->
  <div id="dashboard">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>
          💬 Hội thoại
          <span class="admin-badge">Admin</span>
        </h2>
        <div class="sidebar-actions">
          <button class="btn-sidebar" id="refresh-btn" title="Làm mới">🔄</button>
          <button class="btn-sidebar" id="admin-logout-btn" title="Đăng xuất">🚪</button>
        </div>
      </div>

      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="Tìm kiếm cuộc hội thoại..." />
      </div>

      <div class="conversation-list" id="conversation-list">
        <div class="sidebar-empty" id="sidebar-empty">
          <div class="sidebar-empty-icon">📭</div>
          <p>Chưa có cuộc hội thoại nào.<br/>Đang chờ khách hàng liên hệ...</p>
        </div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chat-panel">
      <!-- No chat selected -->
      <div class="no-chat-selected" id="no-chat">
        <div class="no-chat-icon">💬</div>
        <h3>Chọn một cuộc hội thoại</h3>
        <p>Chọn cuộc hội thoại từ danh sách bên trái để bắt đầu trả lời</p>
      </div>

      <!-- Active Chat View (hidden by default) -->
      <div id="active-chat" style="display:none; flex-direction:column; height:100%;">
        <!-- Header -->
        <div class="chat-header">
          <div class="chat-header-left">
            <img class="avatar" id="chat-avatar" src="" alt="" />
            <div class="chat-header-info">
              <h3 id="chat-user-name">User</h3>
              <div class="status">
                <span class="status-dot"></span>
                <span>Đang hoạt động</span>
              </div>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="btn-header danger" id="close-conv-btn">✕ Đóng hội thoại</button>
          </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="admin-messages"></div>

        <!-- Input -->
        <div class="chat-input-area">
          <div class="image-preview-bar" id="admin-img-preview">
            <img id="admin-preview-img" src="" alt="" />
            <div class="preview-info">
              <div class="preview-name" id="admin-preview-name"></div>
              <div id="admin-preview-size"></div>
            </div>
            <button class="preview-remove" id="admin-remove-preview">✕</button>
          </div>
          <div class="input-row">
            <div class="input-actions">
              <button id="admin-img-btn" title="Gửi ảnh">🖼️</button>
              <input type="file" id="admin-image-input" accept="image/*" />
            </div>
            <div class="msg-input-wrapper">
              <textarea id="admin-message-input" placeholder="Nhập tin nhắn..." rows="1"></textarea>
            </div>
            <button class="btn-send" id="admin-send-btn" title="Gửi">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="Full size" />
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
